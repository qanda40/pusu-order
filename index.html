<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普素素食 - 2026年7月線上訂購</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f4; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #4CAF50; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .product-name { font-weight: 500; }
        .product-price { color: #888; font-size: 13px; margin-left: 5px; }
        
        /* 加減按鈕樣式 */
        .quantity-group { display: flex; align-items: center; }
        .quantity-group button { width: 32px; height: 32px; padding: 0; background-color: #e0e0e0; color: #333; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; margin: 0; }
        .quantity-group button:hover { background-color: #d5d5d5; }
        .product-qty { width: 45px; height: 30px; border: none; text-align: center; font-size: 16px; background: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 總金額顯示區塊 */
        .total-price-box { text-align: right; font-size: 18px; font-weight: bold; color: #ff5722; padding: 15px 0; border-bottom: 2px solid #4CAF50; margin-bottom: 15px; }
        
        .form-group { margin: 18px 0; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        input[type="text"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        
        /* 同意勾選框樣式 */
        .checkbox-group { display: flex; align-items: center; margin: 20px 0; font-size: 14px; }
        .checkbox-group input { width: 18px; height: 18px; margin-right: 8px; cursor: pointer; }
        
        button.submit-btn { width: 100%; padding: 14px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.submit-btn:hover { background-color: #45a049; }
    </style>
</head>
<body>

<div class="container">
    <h2>普素素食 2026年7月訂購單</h2>
    <div class="subtitle">歡迎使用線上訂購，請填寫以下表單：</div>

    <form id="orderForm">
        <div class="product-item">
            <div>
                <span class="product-name">▪ 素麵線 1000g</span>
                <span class="product-price">($120)</span>
            </div>
            <div class="quantity-group">
                <button type="button" onclick="changeQty(this, -1)">-</button>
                <input type="number" class="product-qty" data-name="素麵線 1000g" data-price="120" min="0" value="0" readonly>
                <button type="button" onclick="changeQty(this, 1)">+</button>
            </div>
        </div>
        <div class="product-item">
            <div>
                <span class="product-name">▪ 麻辣素肉乾 250g</span>
                <span class="product-price">($160)</span>
            </div>
            <div class="quantity-group">
                <button type="button" onclick="changeQty(this, -1)">-</button>
                <input type="number" class="product-qty" data-name="麻辣素肉乾 250g" data-price="160" min="0" value="0" readonly>
                <button type="button" onclick="changeQty(this, 1)">+</button>
            </div>
        </div>
        <div class="product-item">
            <div>
                <span class="product-name">▪ 何首烏養生湯 800g</span>
                <span class="product-price">($160)</span>
            </div>
            <div class="quantity-group">
                <button type="button" onclick="changeQty(this, -1)">-</button>
                <input type="number" class="product-qty" data-name="何首烏養生湯 800g" data-price="160" min="0" value="0" readonly>
                <button type="button" onclick="changeQty(this, 1)">+</button>
            </div>
        </div>
        <div class="product-item">
            <div>
                <span class="product-name">▪ 猴菇四神湯 800g</span>
                <span class="product-price">($130)</span>
            </div>
            <div class="quantity-group">
                <button type="button" onclick="changeQty(this, -1)">-</button>
                <input type="number" class="product-qty" data-name="猴菇四神湯 800g" data-price="130" min="0" value="0" readonly>
                <button type="button" onclick="changeQty(this, 1)">+</button>
            </div>
        </div>
        <div class="product-item">
            <div>
                <span class="product-name">▪ 麻辣豆腐醬 120g</span>
                <span class="product-price">($90)</span>
            </div>
            <div class="quantity-group">
                <button type="button" onclick="changeQty(this, -1)">-</button>
                <input type="number" class="product-qty" data-name="麻辣豆腐醬 120g" data-price="90" min="0" value="0" readonly>
                <button type="button" onclick="changeQty(this, 1)">+</button>
            </div>
        </div>
        <div class="product-item">
            <div>
                <span class="product-name">▪ 撈麵醬 120g</span>
                <span class="product-price">($90)</span>
            </div>
            <div class="quantity-group">
                <button type="button" onclick="changeQty(this, -1)">-</button>
                <input type="number" class="product-qty" data-name="撈麵醬 120g" data-price="90" min="0" value="0" readonly>
                <button type="button" onclick="changeQty(this, 1)">+</button>
            </div>
        </div>

        <div class="total-price-box">
            訂單總金額：$<span id="totalPriceDisplay">0</span> 元
        </div>

        <div class="form-group">
            <label for="username">收貨人姓名</label>
            <input type="text" id="username" placeholder="請填寫收件人真實姓名" required>
        </div>
        
        <div class="form-group">
            <label for="phone">收貨人電話</label>
            <input type="text" id="phone" placeholder="請填寫聯絡電話" required>
        </div>

        <div class="form-group">
            <label for="shipping">收貨方式</label>
            <select id="shipping" onchange="updateAddressLabel()" required>
                <option value="7-11店到店">7-11店到店</option>
                <option value="全家店到店">全家店到店</option>
                <option value="宅配">宅配</option>
            </select>
        </div>
        
        <div class="form-group">
            <label id="addressLabel" for="address">超商店名：</label>
            <input type="text" id="address" placeholder="請填寫超商門市名稱 (例如：中正店)" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="agreeCheckbox" required>
            <label for="agreeCheckbox" style="display:inline; font-weight:normal; margin:0; cursor:pointer;">
                我已閱讀並同意訂購說明 ✅
            </label>
        </div>

        <button type="submit" class="submit-btn">確認送出訂單</button>
    </form>
</div>

<script>
    const MY_LIFF_ID = '2010580407-4JQQOeBf'; 
    
    // 🔗 這裡已經幫你更換成最新的 Google 試算表網路應用程式網址囉！
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwVgpjtJegfW-UaSUbDCCccfE4WIeaAUOuCYT2_oFtfR5zBCgB3Hobl5EaaaK32mExlyQ/exec';

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        } catch (error) {
            console.error('LIFF 初始化失敗', error);
        }
    }

    function changeQty(button, amount) {
        const input = button.parentElement.querySelector('.product-qty');
        let currentVal = parseInt(input.value) || 0;
        let newVal = currentVal + amount;
        if (newVal < 0) newVal = 0;
        input.value = newVal;
        
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        const qtyInputs = document.querySelectorAll('.product-qty');
        qtyInputs.forEach(input => {
            const qty = parseInt(input.value) || 0;
            const price = parseInt(input.getAttribute('data-price')) || 0;
            total += qty * price;
        });
        document.getElementById('totalPriceDisplay').innerText = total;
        return total;
    }

    function updateAddressLabel() {
        const shipping = document.getElementById('shipping').value;
        const label = document.getElementById('addressLabel');
        const input = document.getElementById('address');
        
        if (shipping === '宅配') {
            label.innerText = '收件住址：';
            input.placeholder = '請填寫完整寄送住址';
        } else {
            label.innerText = '超商店名：';
            if (shipping === '7-11店到店') {
                input.placeholder = '請填寫7-11門市名稱 (例如：中正店)';
            } else {
                input.placeholder = '請填寫全家門市名稱 (例如：中正店)';
            }
        }
    }

    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        let itemsSummary = '';
        let itemsForSheet = []; 
        let totalOrderPrice = 0;
        const qtyInputs = document.querySelectorAll('.product-qty');
        
        qtyInputs.forEach(input => {
            const qty = parseInt(input.value) || 0;
            const price = parseInt(input.getAttribute('data-price')) || 0;
            if (qty > 0) {
                const name = input.getAttribute('data-name');
                itemsSummary += `▪ ${name} x ${qty}\n`;
                itemsForSheet.push(`${name}x${qty}`);
                totalOrderPrice += qty * price;
            }
        });

        if (!itemsSummary) {
            alert('請至少選擇一項商品的數量唷！');
            return;
        }

        const name = document.getElementById('username').value;
        const phone = document.getElementById('phone').value;
        const shipping = document.getElementById('shipping').value;
        const address = document.getElementById('address').value;

        let locationLabel = (shipping === '宅配') ? '收件住址' : '超商店名';

        // 1. 組裝要寫入試算表的資料
        const orderDataForSheet = {
            name: name,
            phone: phone,
            shipping: shipping,
            address: address,
            itemsAndTotal: itemsForSheet.join(', ') + ` (總計: $${totalOrderPrice}元)`
        };

        // 2. 同步發送資料到 Google 試算表
        try {
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(orderDataForSheet)
            });
        } catch (err) {
            console.error('後台試算表寫入錯誤：', err);
        }

        // 3. LINE 訊息精簡格式輸出
        const messageText = `《普素素食 2026年7月訂購單》\n\n訂購品項與數量：\n${itemsSummary}💰 訂單總金額：$${totalOrderPrice} 元\n\n收貨人姓名：${name}\n收貨人電話：${phone}\n收貨方式：${shipping}\n${locationLabel}：${address}\n\n我已閱讀並同意訂購說明 ✅`;

        if (liff.isInClient()) {
            try {
                await liff.sendMessages([{ type: 'text', text: messageText }]);
                liff.closeWindow();
            } catch (err) {
                alert('訊息傳送失敗：' + err.message);
            }
        } else {
            alert('偵測到不在 LINE 內，模擬發送並寫入試算表：\n\n' + messageText);
        }
    });

    initLiff();
</script>
</body>
</html>
